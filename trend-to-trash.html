<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
    <button class="lightbox-nav lightbox-prev" onclick="navigate(event, -1)">&#8249;</button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-nav lightbox-next" onclick="navigate(event, 1)">&#8250;</button>
    <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<script>
    const images = document.querySelectorAll('.gallery-item img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const counter = document.getElementById('lightboxCounter');
    let currentIndex = 0;

    function openLightbox(index) {
        currentIndex = index;
        updateLightbox();
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox(e) {
        if (e.target === lightbox || e.target.classList.contains('lightbox-close')) {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
    }

    function navigate(e, dir) {
        e.stopPropagation();
        currentIndex = (currentIndex + dir + images.length) % images.length;
        updateLightbox();
    }

    function updateLightbox() {
        const src = images[currentIndex].src.replace('/web/', '/full/');
        lightboxImg.src = src;
        counter.textContent = (currentIndex + 1) + ' / ' + images.length;
    }

    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') { lightbox.classList.remove('active'); document.body.style.overflow = ''; }
        if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % images.length; updateLightbox(); }
        if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + images.length) % images.length; updateLightbox(); }
    });

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function toggleMenu() {
        document.getElementById('navLinks').classList.toggle('open');
        document.querySelector('.hamburger').classList.toggle('open');
    }
</script>

<script>
    // Persist fullscreen across page navigation
    if (sessionStorage.getItem("fullscreen") === "true" && !document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    }
    document.addEventListener("fullscreenchange", () => {
        sessionStorage.setItem("fullscreen", !!document.fullscreenElement);
    });
