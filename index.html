<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Matthis Kleeb — Fotograf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Playfair+Display:wght@400;500;700&family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&family=DM+Serif+Display&family=Cinzel:wght@400;500&family=Cormorant:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        html { height: 100%; }
        body { height: calc(100vh + 1px); height: calc(100dvh + 1px); }

        .hero {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            /* Extend behind Safari safe areas */
            top: env(safe-area-inset-top, 0);
            left: 0;
            right: 0;
            bottom: 0;
            top: 0;
            height: 100vh;
            height: 100dvh;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.12) 0%,
                rgba(0,0,0,0.0) 35%,
                rgba(0,0,0,0.35) 100%
            );
        }

        .hero-content {
            position: fixed;
            bottom: 3rem;
            left: 2rem;
            z-index: 10;
            color: #fff;
            transition: opacity 0.4s;
        }

        .hero-content.hidden { opacity: 0; pointer-events: none; }

        .hero-content h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
            transition: all 0.4s;
        }

        /* Playfair — high contrast editorial like Vogue */
        .hero-content h1.playfair {
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 400;
            font-size: 3.2rem;
        }

        /* Bodoni — Valentino/Armani territory */
        .hero-content h1.bodoni {
            font-family: 'Bodoni Moda', serif;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 400;
            font-size: 3rem;
        }

        /* DM Serif — warm, refined, gallery feel */
        .hero-content h1.dmserif {
            font-family: 'DM Serif Display', serif;
            text-transform: none;
            letter-spacing: 0.03em;
            font-weight: 400;
            font-size: 3.2rem;
        }

        /* Cinzel — fine art, museum, timeless */
        .hero-content h1.cinzel {
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-weight: 400;
            font-size: 2.6rem;
        }

        /* Cormorant Italic — effortless elegance */
        .hero-content h1.cormorant-italic {
            font-family: 'Cormorant', serif;
            font-style: italic;
            text-transform: none;
            letter-spacing: 0.04em;
            font-weight: 300;
            font-size: 3.5rem;
        }

        .hero-enter {
            position: fixed;
            bottom: 3rem;
            right: 2rem;
            z-index: 10;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            opacity: 0.7;
            transition: opacity 0.2s;
            font-family: inherit;
        }

        .hero-enter:hover { opacity: 1; }

        /* A/B toggle */
        .ab-toggle {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .ab-toggle:hover { opacity: 1; }

        /* Override nav for hero page */
        header { background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; }
        .logo { color: #fff; }
        .nav-links a { color: #fff; }
        .hamburger span { background: #fff; }
        .fullscreen-btn { color: #fff; }
        .story-progress .dot { background: rgba(255, 255, 255, 0.3); }
        .story-progress .dot.active { background: rgba(255, 255, 255, 0.9); }
        footer { display: none; }

        @media (max-width: 768px) {
            .hero-content { bottom: calc(3rem + env(safe-area-inset-bottom, 0px)); left: 1.2rem; }
            .hero-content h1 { font-size: 1.8rem; }
            .hero-content h1.playfair { font-size: 2rem; }
            .hero-content h1.bodoni { font-size: 1.8rem; }
            .hero-content h1.dmserif { font-size: 2rem; }
            .hero-content h1.cinzel { font-size: 1.6rem; }
            .hero-content h1.cormorant-italic { font-size: 2.2rem; }
            .hero-enter { bottom: calc(3rem + env(safe-area-inset-bottom, 0px)); right: 1.2rem; font-size: 0.9rem; }
            .ab-toggle { bottom: calc(1rem + env(safe-area-inset-bottom, 0px)); font-size: 0.7rem; }
            /* Mobile menu: white/frosted */
            .nav-links.open {
                background: rgba(255, 255, 255, 0.98) !important;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
            }
            .nav-links.open a { color: #1a1a1a !important; }
            .hamburger.open span { background: #1a1a1a; }
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo-wrap" onclick="cycleStory()">
            <div class="story-progress" id="storyProgress"></div>
            <span class="logo">Matthis Kleeb</span>
        </div>
        <div class="nav-right">
        <button class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="portfolio.html">Stories</a></li>
            <li><a href="portraits.html">Portraits</a></li>
            <li><a href="singles.html">Singles</a></li>
            <li><a href="kontakt.html">Contact</a></li>
        </ul>
        <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullskjerm">⛶</button>
        </div>
    </nav>
</header>

<div class="hero" id="heroArea">
    <img id="heroImg" src="" alt="Matthis Kleeb">
    <div class="hero-overlay"></div>
</div>

<div class="hero-content" id="heroContent">
    <h1>Matthis Kleeb</h1>
</div>

<a href="portfolio.html" class="hero-enter">Explore the work →</a>

<button class="ab-toggle" onclick="toggleName()">A / B</button>

<script>
    const stories = [
        { img: 'bilder/Stories/50 draper i havet/full/01.jpg', url: '50-draper.html' },
        { img: 'bilder/Stories/Africas Last Colony/full/Cewe-photoworld_Matthis_Kleeb_01.jpg', url: 'africas-last-colony.html' },
        { img: 'bilder/Stories/From Trend to Trash/full/01.jpg', url: 'trend-to-trash.html' },
        { img: 'bilder/Stories/Homophobia in Tanzania/full/Materclass_NJP_15.jpg', url: 'homophobia-tanzania.html' },
        { img: 'bilder/Stories/Miljopolitiet i Brasil/full/01.jpg', url: 'miljopolitiet.html', focus: '75% center' },
    ];

    let storyIndex = Math.floor(Math.random() * stories.length);

    // Progressbar
    const progress = document.getElementById('storyProgress');
    stories.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === storyIndex ? ' active' : '');
        progress.appendChild(dot);
    });
    progress.style.width = (stories.length * 18) + 'px';

    document.getElementById('heroImg').src = stories[storyIndex].img;
    if (stories[storyIndex].focus) {
        document.getElementById('heroImg').style.objectPosition = stories[storyIndex].focus;
    }

    function cycleStory(dir) {
        dir = dir || 1;
        storyIndex = (storyIndex + dir + stories.length) % stories.length;
        const img = document.getElementById('heroImg');
        img.style.opacity = '0';
        img.style.transition = 'opacity 0.3s';
        setTimeout(() => {
            img.src = stories[storyIndex].img;
            img.style.objectPosition = stories[storyIndex].focus || 'center';
            img.onload = () => { img.style.opacity = '1'; };
        }, 300);
        document.querySelectorAll('.story-progress .dot').forEach((d, i) => {
            d.className = 'dot' + (i === storyIndex ? ' active' : '');
        });
    }

    // A/B/C toggle for name styles
    const nameStyles = [
        { cls: '', label: 'A: Cormorant' },
        { cls: 'playfair', label: 'B: Playfair' },
        { cls: 'bodoni', label: 'C: Bodoni' },
        { cls: 'dmserif', label: 'D: DM Serif' },
        { cls: 'cinzel', label: 'E: Cinzel' },
        { cls: 'cormorant-italic', label: 'F: Cormorant Italic' },
        { cls: 'hidden', label: 'G: Hidden' },
    ];
    let nameIndex = 0;

    function toggleName() {
        const h1 = document.querySelector('.hero-content h1');
        const content = document.getElementById('heroContent');
        // Remove all style classes
        h1.className = '';
        content.classList.remove('hidden');
        // Advance
        nameIndex = (nameIndex + 1) % nameStyles.length;
        const style = nameStyles[nameIndex];
        if (style.cls === 'hidden') {
            content.classList.add('hidden');
        } else if (style.cls) {
            h1.classList.add(style.cls);
        }
        document.querySelector('.ab-toggle').textContent = style.label;
    }

    // Nudge Safari to hide URL bar on load
    setTimeout(() => window.scrollTo(0, 1), 300);

    // Tap anywhere on mobile to cycle
    if ('ontouchstart' in window) {
        document.getElementById('heroArea').addEventListener('click', (e) => {
            if (e.target.closest('a, button, nav')) return;
            cycleStory(1);
        });
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') cycleStory(1);
        if (e.key === 'ArrowLeft') cycleStory(-1);
        if (e.key === 'Enter') window.location.href = stories[storyIndex].url;
    });
</script>
<script src="shared.js"></script>

</body>
</html>
